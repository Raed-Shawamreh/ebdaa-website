<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="sheen3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cartFill2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0fdf6"/>
    </linearGradient>
    <filter id="cartShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- خلفية متدرجة بزوايا مدوّرة -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1024" height="560" rx="230" fill="url(#sheen3)"/>

  <!-- ====== السلة في المنتصف ====== -->
  <!-- إزاحة كاملة لتوسيط السلة عمودياً وأفقياً (السلة عرضها ~566، ارتفاعها ~444) -->
  <g transform="translate(179, 120)">
    <!-- ظل السلة -->
    <g transform="translate(0,16)" opacity="0.22" filter="url(#cartShadow2)">
      <path d="M 23 86 L 89 86 L 125 160 L 589 160 L 509 400 L 181 400 L 167 444 L 531 444"
            fill="none" stroke="#000" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- إطار السلة -->
    <g fill="none" stroke="url(#cartFill2)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 23 86 L 89 86 L 125 160"/>
      <path d="M 125 160 L 589 160 L 509 400 L 181 400 Z"/>
      <path d="M 181 400 L 167 444 L 531 444"/>
    </g>

    <!-- منتجات داخل السلة — كلها بلون موحّد (ذهبي) -->
    

    <!-- عجلات السلة -->
    <circle cx="241" cy="530" r="48" fill="#ffffff"/>
    <circle cx="241" cy="530" r="20" fill="#0d9488"/>
    <circle cx="481" cy="530" r="48" fill="#ffffff"/>
    <circle cx="481" cy="530" r="20" fill="#0d9488"/>
  </g>

  <!-- نص Ebda3 — E و 3 بنفس لون المنتجات (ذهبي) -->
  <text x="512" y="900" text-anchor="middle"
        font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
        font-size="148" font-weight="800" letter-spacing="-2">
    <tspan fill="#fbbf24">E</tspan><tspan fill="#ffffff">bda</tspan><tspan fill="#fbbf24">3</tspan>
  </text>
</svg>
